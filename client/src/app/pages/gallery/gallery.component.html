<section class="gallery-page">
  <!-- ===============================
       Gallery hero heading
       =============================== -->

  <header class="gallery-header">
    <h1>Beauty Inspiration Gallery</h1>

    <div class="gallery-divider">
      <span></span>
      <i class="fa-regular fa-heart"></i>
      <span></span>
    </div>

    <p>
      Explore our latest nail and makeup creations.
      <br />
      Find your next look, save your favorites, and get inspired.
    </p>
  </header>

  <!-- ===============================
       Gallery category filters
       =============================== -->

  <nav class="gallery-filters" aria-label="Gallery filters">
    <button
      type="button"
      *ngFor="let filter of filters"
      [class.active]="selectedCategory === filter.id"
      (click)="selectCategory(filter.id)"
    >
      <img
        *ngIf="filter.iconUrl"
        [src]="filter.iconUrl"
        [alt]="filter.iconAltText"
      />

      <i
        *ngIf="!filter.iconUrl"
        [class]="filter.iconClass"
      ></i>

      {{ filter.label }}
    </button>
  </nav>

  <!-- ===============================
       Gallery masonry style layout
       =============================== -->

  <section class="gallery-grid" *ngIf="visibleGalleryItems.length > 0">
    <article
      class="gallery-card"
      *ngFor="let item of visibleGalleryItems; let index = index; trackBy: trackByGalleryItemId"
      [class.gallery-card-tall]="isGalleryCardTall(index)"
      [ngStyle]="getGalleryCardGridStyle(index)"
    >
      <div class="gallery-image-wrap">
        <img
          [src]="item.imageUrl"
          [alt]="item.altText"
        />
      </div>

      <div class="gallery-card-content">
        <div>
          <h2>{{ item.title }}</h2>
          <p>{{ item.description }}</p>
        </div>

        <button
          type="button"
          class="favorite-button"
          [class.active]="item.isFavorite"
          (click)="toggleFavorite(item)"
          [attr.aria-label]="item.isFavorite ? 'Remove from favorites' : 'Add to favorites'"
        >
          <i
            class="fa-heart"
            [class.fa-solid]="item.isFavorite"
            [class.fa-regular]="!item.isFavorite"
          ></i>
        </button>
      </div>
    </article>
  </section>

  <!-- ===============================
       Empty favorites message
       =============================== -->

  <section class="empty-gallery-message" *ngIf="visibleGalleryItems.length === 0">
    <i class="fa-regular fa-heart"></i>
    <h2>No favorites yet</h2>
    <p>Tap the heart on any gallery design to save it here.</p>
  </section>

  <!-- ===============================
       Load more button
       =============================== -->

  <div class="load-more-wrap" *ngIf="hasMoreGalleryItems">
    <button
      type="button"
      class="load-more-button"
      (click)="loadMoreItems()"
    >
      Load More
      <i class="fa-solid fa-arrow-rotate-right"></i>
    </button>
  </div>
</section>
