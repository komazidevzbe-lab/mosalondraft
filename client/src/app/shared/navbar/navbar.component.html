<header class="site-navbar">
  <!-- ===============================
       Logo section
       Uses the same coded MO brand style as the landing pages.
       =============================== -->

  <a class="navbar-logo" routerLink="/home" aria-label="MO Nail and Makeup Artist home">
    <span class="logo-main">
      <span>M</span>
      <span>O</span>
    </span>

    <span class="logo-label">NAIL &amp; MAKEUP ARTIST</span>
  </a>

  <!-- ===============================
       Main navigation links
       These links are reused across all public pages.
       =============================== -->

  <nav class="navbar-links" aria-label="Main navigation">
    <a
      routerLink="/home"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      HOME
    </a>

    <a
      href="/services"
      [class.active]="isServicesFlowActive"
      (click)="startFreshServicesFlow($event)"
    >
      SERVICES
    </a>

    <a routerLink="/gallery" routerLinkActive="active">
      GALLERY
    </a>

    <a routerLink="/contact" routerLinkActive="active">
      CONTACT
    </a>
  </nav>

  <!-- ===============================
       Sign out button
       Opens the custom signout confirmation modal.
       =============================== -->

  <button
    type="button"
    class="navbar-signout-button"
    aria-label="Sign out"
    (click)="openSignoutModal()"
  >
    <i class="fa-solid fa-right-from-bracket"></i>
    <span>SIGN OUT</span>
  </button>
</header>
